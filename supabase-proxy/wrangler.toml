# Cloudflare Worker: Supabase proxy (bypasses Jio/India DNS block on *.supabase.co)
# Deploy: npx wrangler deploy
# Set your Supabase URL in the dashboard (Workers & Pages > your worker > Settings > Variables)
# or via CLI: npx wrangler secret put SUPABASE_URL
# (You can also use [vars] here for non-secret SUPABASE_URL since it's public in the frontend.)

name = "supabase-proxy"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
# Your Supabase project URL (same as in your app's .env). Override in dashboard if needed.
SUPABASE_URL = "https://rhxyvnqcrchwsjnukmjm.supabase.co"
# Restrict CORS to your app origins (recommended for production)
ALLOWED_ORIGINS = "https://www.aavisdecor.com,https://aavisdecor.com,http://localhost:8080,http://localhost:8081,http://localhost:8082"
